<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเหตุการณ์ รปภ. โรงพยาบาล</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="date"], input[type="time"], select, textarea {
            width: 100%; padding: 8px; box-sizing: border-box;
        }
        .checkbox-group label { display: inline-block; font-weight: normal; margin-right: 15px; width: auto;}
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-size: 16px;}
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">📝 บันทึกเหตุการณ์ รปภ.</h2>

    <form id="incidentForm">
        <div class="form-group">
            <label>วันที่เกิดเหตุ:</label>
            <input type="date" name="date" required>
        </div>
        <div class="form-group">
            <label>เวลา:</label>
            <input type="time" name="time" required>
        </div>
        <div class="form-group">
            <label>เวรที่ปฏิบัติงาน:</label>
            <select name="shift" required>
                <option value="">-- เลือกเวร --</option>
                <option value="เวรเช้า">เวรเช้า</option>
                <option value="เวรบ่าย">เวรบ่าย</option>
                <option value="เวรดึก">เวรดึก</option>
            </select>
        </div>
        <div class="form-group">
            <label>ชื่อ รปภ. ผู้บันทึก:</label>
            <input type="text" name="guardName" required>
        </div>

        <div class="form-group checkbox-group">
            <label>สถานที่เกิดเหตุ (เลือกได้มากกว่า 1):</label><br>
            <label><input type="checkbox" name="location_check" value="OPD"> OPD</label>
            <label><input type="checkbox" name="location_check" value="ER"> ER</label>
            <label><input type="checkbox" name="location_check" value="คลังยา"> คลังยา</label>
            <label><input type="checkbox" name="location_check" value="ลานจอดรถ"> ลานจอดรถ</label>
            <input type="hidden" name="locations" id="locations_hidden">
        </div>

        <div class="form-group">
            <label>รายละเอียดเหตุการณ์:</label>
            <textarea name="incidentDetail" rows="4" required></textarea>
        </div>

        <button type="submit" id="submitBtn">💾 บันทึกข้อมูล</button>
    </form>

    <script>
        // *** เอา URL ที่คัดลอกมาจาก Apps Script มาวางในเครื่องหมายคำพูดด้านล่างนี้ ***
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwP9PqzrPhq068w9NycpkLSR02030XOXLCdOp3fShBlhBqecHgNOMbP_I8CY7WnxIk/exec'; 
        const form = document.forms['incidentForm'];
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังบันทึกข้อมูล...";

            // รวมค่า checkbox หลายๆ อันให้เป็นข้อความเดียวกัน คั่นด้วยลูกน้ำ
            let selectedLocations = [];
            let checkboxes = document.querySelectorAll('input[name="location_check"]:checked');
            checkboxes.forEach((cb) => { selectedLocations.push(cb.value); });
            document.getElementById('locations_hidden').value = selectedLocations.join(', ');

            // ส่งข้อมูลไปที่ Google Sheets แบบ Background (ไม่ต้องเปลี่ยนหน้า)
            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
                .then(response => {
                    alert('บันทึกข้อมูลลงตารางสำเร็จเรียบร้อยแล้ว!');
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.innerText = "💾 บันทึกข้อมูล";
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('เกิดข้อผิดพลาดในการบันทึก');
                    submitBtn.disabled = false;
                    submitBtn.innerText = "💾 บันทึกข้อมูล";
                });
        });
    </script>

</body>
</html>
